name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: rustup toolchain install stable --profile minimal --component clippy,rustfmt
      - run: cargo +stable fmt --all --check
      - run: cargo +stable clippy --workspace --all-targets --all-features --locked -- -D warnings
      - run: python3 -B -m unittest discover -s tools -p 'test_*.py' -v
      - run: cargo +stable doc --workspace --all-features --no-deps --locked
        env:
          RUSTDOCFLAGS: -D warnings
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - run: rustup toolchain install stable --profile minimal
      - run: cargo +stable test --workspace --all-features --locked
  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: rustup toolchain install 1.85.0 --profile minimal
      - run: cargo +1.85.0 check --workspace --all-targets --all-features --locked
      - run: cargo +1.85.0 test --workspace --all-features --locked
